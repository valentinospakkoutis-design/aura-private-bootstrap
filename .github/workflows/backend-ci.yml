name: Backend CI (Pytest Baseline)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-pytest:
    name: Backend Pytest (unit + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify live test env is not set
        run: |
          if [ -n "${AURA_LIVE_BASE_URL:-}" ]; then
            echo "AURA_LIVE_BASE_URL must not be set in CI baseline run."
            exit 1
          fi
          echo "Live test base URL not set (expected)."

      - name: Run hardened pytest baseline
        run: python -m pytest
