[pytest]
minversion = 8.0
testpaths =
    tests/unit
    tests/integration
    tests/live
python_files = test_*.py
addopts = -ra --strict-config --strict-markers --durations=10 --timeout=30 -m "not live"
markers =
    unit: deterministic isolated unit tests
    integration: deterministic controlled integration tests
    live: opt-in live tests that require a running backend or external services
timeout = 30
timeout_method = thread
filterwarnings =
    error::pytest.PytestReturnNotNoneWarning