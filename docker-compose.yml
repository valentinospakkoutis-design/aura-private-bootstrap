# Local stack for the AURA backend.
# Brings up the FastAPI API on :8080 (matching the app's API_BASE_URL),
# backed by Postgres and Redis.

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgresql://aura:aura@db:5432/aura"
      REDIS_URL: "redis://redis:6379/0"
      # Persist trained models outside the ephemeral container filesystem.
      AURA_MODELS_DIR: "/data/models"
    volumes:
      - models:/data/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: aura
      POSTGRES_DB: aura
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  models:
